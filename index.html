<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pinky</title>
    <link rel="icon" type="image/png" href="PMLogo.png">
    
    <style>
        :root {
            --pinky-green-trans: rgba(141, 163, 153, 0.5); 
            --pinky-red-trans: rgba(163, 93, 93, 0.4);   
            --pinky-bg: #121212; 
            --old-paper: #f9f5e0; 
        }

        body { 
            margin: 0; padding: 0; font-family: sans-serif;
            background: var(--pinky-bg); color: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- BANNERS --- */
        .top-bar { 
            background: var(--pinky-green-trans); 
            padding: 15px; text-align: center; 
            border-bottom: 2px solid rgba(163, 93, 93, 0.5); 
            z-index: 10; 
        }
        
        .top-bar h1 { 
            margin: 0; letter-spacing: 10px; font-weight: bold;
            color: #1a241f; text-transform: uppercase;
            font-size: 2.5rem;
        }

        .main-container { 
            flex-grow: 1; position: relative; display: flex; overflow: hidden;
            background-repeat: no-repeat; background-position: center; background-size: cover;
        }

        .public-side { 
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('pinkybackground.png'); 
        }
        .anon-side { 
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('anonymousbackground.png'); 
        }

        #thread-manager { flex-grow: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; gap: 20px; }
        
        .thread-card { 
            background: rgba(249, 245, 224, 0.88); 
            border: 1px solid rgba(163, 93, 93, 0.25); 
            padding: 20px; cursor: pointer; 
        }
        .thread-card:hover { background: var(--old-paper); }
        .thread-title { font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 8px; padding-bottom: 5px; }
        .thread-meta { font-size: 0.75rem; color: #666; }

        #active-thread-view { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(249, 245, 224, 0.98); 
            z-index: 100; display: none; flex-direction: column; 
        }
        #post-list { flex-grow: 1; overflow-y: auto; padding: 40px; }
        .post-entry { border-bottom: 1px solid rgba(141, 163, 153, 0.3); padding: 20px 0; }
        .post-identity { font-weight: bold; color: #7a4242; margin-bottom: 8px; font-size: 0.9rem; }

        .sidebar { 
            width: 320px; 
            background: rgba(141, 163, 153, 0.4); 
            border-left: 2px solid rgba(163, 93, 93, 0.4); 
            padding: 25px; display: flex; flex-direction: column; gap: 20px; 
        }
        .input-box { width: 92%; padding: 10px; border: 1px solid rgba(0,0,0,0.15); font-family: inherit; background: rgba(255,255,255,0.7); }
        .btn { 
            background: var(--pinky-red-trans); 
            color: #1a1a1a; border: 1px solid rgba(0,0,0,0.1);
            padding: 12px; cursor: pointer; font-weight: bold; font-family: inherit; 
        }
        .btn:hover { background: rgba(163, 93, 93, 0.75); color: white; }

        .controls { 
            background: var(--pinky-green-trans); 
            padding: 12px; border-top: 2px solid rgba(163, 93, 93, 0.4); 
            display: flex; justify-content: center; gap: 30px; z-index: 10; 
        }
        .nav-link { color: #1a241f; text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fffcf0; border: 3px solid #7a4242; padding: 25px; z-index: 500; width: 420px; box-shadow: 15px 15px 0px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="top-bar"><h1>THE PINKY</h1></div>

    <div id="main-view" class="main-container public-side">
        <div id="thread-manager"></div>

        <div class="sidebar">
            <button class="btn" id="switchBtn" style="background: rgba(0,0,0,0.85); color: #00f2ff;">SWITCH SIDES</button>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.2);">
            <input type="text" id="threadSearch" placeholder="Search transmissions..." class="input-box" oninput="window.filterThreads()">
            <button class="btn" id="openCreateBtn">CREATE THREAD</button>
        </div>

        <div id="active-thread-view">
            <div style="padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.1);">
                <button onclick="closeThread()" class="btn" style="padding: 6px 20px;">RETURN</button>
            </div>
            <div id="post-list"></div>
            <div style="padding: 25px; border-top: 2px solid var(--pinky-green-trans); background: rgba(0,0,0,0.03);">
                <textarea id="replyText" class="input-box" style="height: 80px; width: 95%;" placeholder="Write a reply..."></textarea><br>
                <button class="btn" id="submitReplyBtn">POST REPLY</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <a href="https://thering1.github.io/thering.github.io/" class="nav-link">RING</a>
        <a href="https://thering1.github.io/themiddle.github.io/" class="nav-link">MIDDLE</a>
        <a href="https://thering1.github.io/theindex.github.io/" class="nav-link">INDEX</a>
        <button id="auth-btn" class="btn" style="padding: 6px 15px; font-size: 0.8rem; background: #000; color: #fff;">LOG IN</button>
    </div>

    <div id="create-modal" class="modal">
        <h3>NEW THREAD</h3>
        <input type="text" id="newTitle" placeholder="Thread Subject" class="input-box"><br><br>
        <textarea id="newBody" placeholder="Message content..." class="input-box" style="height:120px;"></textarea><br>
        <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
            <button class="btn" id="submitThreadBtn">SUBMIT</button>
            <button onclick="document.getElementById('create-modal').style.display='none'" class="btn" style="background: #ddd;">CANCEL</button>
        </div>
    </div>

    <div id="auth-modal" class="modal">
        <div id="login-view">
            <h3>IDENTIFY</h3>
            <input type="text" id="uIn" placeholder="User" class="input-box"><br><br>
            <input type="password" id="pIn" placeholder="Pass" class="input-box"><br><br>
            <button class="btn" id="loginBtn">LOG IN</button>
        </div>
        <div id="user-view" style="display:none;">
            <h3 id="welcome-text"></h3>
            <button class="btn" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const accountConfig = { databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const pinkyConfig = { databaseURL: "https://index-data-4a3b9-default-rtdb.asia-southeast1.firebasedatabase.app" };

        const accApp = initializeApp(accountConfig, "accApp");
        const pinApp = initializeApp(pinkyConfig, "pinApp");
        const userDb = getDatabase(accApp);
        const pinkyDb = getDatabase(pinApp);

        let currentUser = null;
        let isAnonymous = false;
        let activeThreadId = null;

        const starWords = ["Di", "Hua", "Shi", "Yi", "Tian", "Sha", "Gong", "Men", "Shu", "Hui", "Gong", "Xi", "Ba", "Chun", "Can", "Xia", "Xiang"];

        // --- SANITIZATION TOOL ---
        const sanitize = (str) => {
            const temp = document.createElement('div');
            temp.textContent = str || "";
            return temp.innerHTML;
        };

        document.getElementById('auth-btn').onclick = () => document.getElementById('auth-modal').style.display = 'block';
        
        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
            const snap = await get(ref(userDb, `users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                currentUser = snap.val(); currentUser.username = u;
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('user-view').style.display = 'block';
                document.getElementById('welcome-text').innerText = `${currentUser.display_name}, ${currentUser.rank}`;
                document.getElementById('auth-btn').innerText = "ACCOUNT INFO";
                document.getElementById('auth-modal').style.display = 'none';
            } else alert("Invalid credentials.");
        };

        function getAnonName() {
            if (isAnonymous) {
                let first = starWords[Math.floor(Math.random() * starWords.length)];
                let second = starWords[Math.floor(Math.random() * starWords.length)];
                while (first === second) second = starWords[Math.floor(Math.random() * starWords.length)];
                return (first + second).charAt(0).toUpperCase() + (first + second).slice(1) + " Star";
            }
            return "Anonymous";
        }

        function getIdentity() {
            if (currentUser) {
                return `${currentUser.display_name}, ${currentUser.rank} of the ${currentUser.finger || 'Void'}`;
            }
            return getAnonName();
        }

        function loadThreads() {
            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';
            onValue(ref(pinkyDb, boardPath), snap => {
                const manager = document.getElementById('thread-manager');
                manager.innerHTML = "";
                const now = Date.now();
                snap.forEach(child => {
                    const thread = child.val();
                    const tid = child.key;
                    const lastActivity = thread.lastActivity || thread.createdAt;
                    
                    if (now - lastActivity > (12 * 60 * 60 * 1000)) {
                        remove(ref(pinkyDb, `${boardPath}/${tid}`));
                        remove(ref(pinkyDb, `posts/${tid}`));
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = 'thread-card';
                    // We use sanitize() here even though innerHTML is used for the structure
                    card.innerHTML = `<div class="thread-title">${sanitize(thread.title)}</div><div class="thread-meta">By: ${sanitize(thread.authorName)}</div>`;
                    card.onclick = () => openThread(tid, thread.title);
                    manager.appendChild(card);
                });
            });
        }

        document.getElementById('switchBtn').onclick = () => {
            isAnonymous = !isAnonymous;
            document.getElementById('main-view').className = isAnonymous ? 'main-container anon-side' : 'main-container public-side';
            window.closeThread();
            loadThreads();
        };

        document.getElementById('openCreateBtn').onclick = () => {
            document.getElementById('create-modal').style.display = 'block';
        };

        document.getElementById('submitThreadBtn').onclick = async () => {
            const title = document.getElementById('newTitle').value, body = document.getElementById('newBody').value;
            if(!title || !body) return;
            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';
            const author = getIdentity();
            const threadRef = push(ref(pinkyDb, boardPath));
            // Data is sent to DB raw, but sanitized when displayed
            await set(threadRef, { title, authorName: author, createdAt: serverTimestamp(), lastActivity: serverTimestamp() });
            await push(ref(pinkyDb, `posts/${threadRef.key}`), { author, text: body, timestamp: serverTimestamp() });
            document.getElementById('create-modal').style.display = 'none';
            document.getElementById('newTitle').value = "";
            document.getElementById('newBody').value = "";
        };

        window.openThread = (tid, title) => {
            activeThreadId = tid;
            document.getElementById('active-thread-view').style.display = 'flex';
            onValue(ref(pinkyDb, `posts/${tid}`), snap => {
                const list = document.getElementById('post-list');
                list.innerHTML = "";
                
                const titleHeader = document.createElement('h2');
                titleHeader.style.cssText = "border-bottom: 2px solid #7a4242; padding-bottom:10px;";
                titleHeader.textContent = title; // textContent is safe
                list.appendChild(titleHeader);

                snap.forEach(child => {
                    const p = child.val();
                    const div = document.createElement('div');
                    div.className = 'post-entry';
                    div.innerHTML = `<div class="post-identity">${sanitize(p.author)}</div><div>${sanitize(p.text)}</div>`;
                    list.appendChild(div);
                });
            });
        };

        window.closeThread = () => { document.getElementById('active-thread-view').style.display = 'none'; activeThreadId = null; };

        document.getElementById('submitReplyBtn').onclick = async () => {
            const text = document.getElementById('replyText').value;
            if(!text || !activeThreadId) return;
            const author = getIdentity();
            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';
            await push(ref(pinkyDb, `posts/${activeThreadId}`), { author, text, timestamp: serverTimestamp() });
            await update(ref(pinkyDb, `${boardPath}/${activeThreadId}`), { lastActivity: Date.now() });
            document.getElementById('replyText').value = "";
        };

        window.filterThreads = () => {
            const q = document.getElementById('threadSearch').value.toLowerCase();
            document.querySelectorAll('.thread-card').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };

        loadThreads();
    </script>
</body>
</html>
