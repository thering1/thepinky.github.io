<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pinky</title>
    <link rel="icon" type="image/png" href="PMLogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Transparency applied to the green and red */
            --pinky-green-trans: rgba(141, 163, 153, 0.6); 
            --pinky-red-trans: rgba(163, 93, 93, 0.4);   
            --pinky-bg: #1a1a1a; /* Deeper default background */
            --old-paper: #f9f5e0; /* Aged paper tint for threads */
        }

        body { 
            margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; 
            background: var(--pinky-bg); color: #222; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- BANNERS --- */
        .top-bar { 
            background: var(--pinky-green-trans); /* Transparent banner */
            padding: 15px; text-align: center; 
            border-bottom: 2px solid rgba(163, 93, 93, 0.8); /* Slightly less transparent border */
            z-index: 10; 
        }
        .top-bar h1 { 
            margin: 0; letter-spacing: 5px; font-weight: normal;
            color: #1a241f; text-transform: uppercase;
            font-family: 'ZCOOL KuaiLe', cursive; font-size: 3rem; /* Updated font */
        }

        .main-container { 
            flex-grow: 1; position: relative; display: flex; overflow: hidden;
            background-repeat: no-repeat; background-position: center; background-size: cover;
        }

        /* --- SIDES & BACKGROUND DARKENING --- */
        .public-side { 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('pinkybackground.png'); 
        }
        .anon-side { 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('anonymousbackground.png'); 
        }

        /* --- THREAD AREA --- */
        #thread-manager { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px; }
        
        .thread-card { 
            background: rgba(249, 245, 224, 0.85); /* Old Paper with slight transparency */
            border: 1px solid rgba(163, 93, 93, 0.5); 
            padding: 15px; cursor: pointer; 
        }
        .thread-card:hover { background: var(--old-paper); }
        .thread-title { font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid rgba(0,0,0,0.1); margin-bottom: 5px; }
        .thread-meta { font-size: 0.75rem; color: #555; }

        /* --- THE ACTUAL THREAD VIEW --- */
        #active-thread-view { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(249, 245, 224, 0.98); /* Solid Old Paper */
            z-index: 100; display: none; flex-direction: column; 
        }
        #post-list { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .post-entry { border-bottom: 2px solid rgba(141, 163, 153, 0.2); padding: 15px 0; }
        .post-identity { font-weight: bold; color: rgba(163, 93, 93, 0.9); margin-bottom: 5px; }

        /* --- SIDEBAR TOOLS --- */
        .sidebar { 
            width: 300px; 
            background: rgba(141, 163, 153, 0.7); /* Transparent Sidebar */
            border-left: 2px solid rgba(163, 93, 93, 0.8); 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
        }
        .input-box { width: 90%; padding: 8px; border: 1px solid rgba(0,0,0,0.2); font-family: inherit; background: rgba(255,255,255,0.8); }
        .btn { 
            background: var(--pinky-red-trans); /* Transparent buttons */
            color: #222; border: 1px solid rgba(0,0,0,0.2);
            padding: 10px; cursor: pointer; font-weight: bold; font-family: inherit; 
        }
        .btn:hover { background: rgba(163, 93, 93, 0.8); color: white; }

        /* --- BOTTOM BAR --- */
        .controls { 
            background: var(--pinky-green-trans); 
            padding: 10px; border-top: 2px solid rgba(163, 93, 93, 0.8); 
            display: flex; justify-content: center; gap: 20px; z-index: 10; 
        }
        .nav-link { color: #1a241f; text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid #1a241f; padding: 5px 10px; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid rgba(163, 93, 93, 0.8); padding: 20px; z-index: 500; width: 400px; box-shadow: 10px 10px 0px #000; }
    </style>
</head>
<body>

    <div class="top-bar"><h1>THE PINKY</h1></div>

    <div id="main-view" class="main-container public-side">
        <div id="thread-manager">
            </div>

        <div class="sidebar">
            <button class="btn" id="switchBtn" style="background: rgba(0,0,0,0.8); color: var(--index-blue);">SWITCH SIDES</button>
            <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1);">
            <input type="text" id="threadSearch" placeholder="Search threads..." class="input-box" oninput="window.filterThreads()">
            <button class="btn" id="openCreateBtn">CREATE THREAD</button>
        </div>

        <div id="active-thread-view">
            <div style="padding: 10px; border-bottom: 1px solid #ccc;">
                <button onclick="closeThread()" class="btn" style="padding: 5px 15px;">BACK</button>
            </div>
            <div id="post-list"></div>
            <div style="padding: 20px; border-top: 2px solid rgba(141, 163, 153, 0.5); background: rgba(0,0,0,0.05);">
                <textarea id="replyText" class="input-box" style="height: 60px; width: 95%;" placeholder="Write a reply..."></textarea><br>
                <button class="btn" id="submitReplyBtn">REPLY</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <a href="https://thering1.github.io/thering.github.io/" class="nav-link">RING</a>
        <a href="https://thering1.github.io/themiddle.github.io/" class="nav-link">MIDDLE</a>
        <a href="https://thering1.github.io/theindex.github.io/" class="nav-link">INDEX</a>
        <button id="auth-btn" class="btn" style="padding: 5px 10px; font-size: 0.8rem; background: rgba(0,0,0,0.8); color: white;">LOG IN</button>
    </div>

    <div id="create-modal" class="modal">
        <h3>NEW THREAD</h3>
        <input type="text" id="newTitle" placeholder="Thread Title" class="input-box"><br><br>
        <textarea id="newBody" placeholder="Message..." class="input-box" style="height:100px;"></textarea><br>
        <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button class="btn" id="submitThreadBtn">POST</button>
            <button onclick="document.getElementById('create-modal').style.display='none'" class="btn" style="background: #ccc; color: black;">CANCEL</button>
        </div>
    </div>

    <div id="auth-modal" class="modal">
        <div id="login-view">
            <h3>IDENTIFY</h3>
            <input type="text" id="uIn" placeholder="User" class="input-box"><br><br>
            <input type="password" id="pIn" placeholder="Pass" class="input-box"><br><br>
            <button class="btn" id="loginBtn">LOG IN</button>
        </div>
        <div id="user-view" style="display:none;">
            <h3 id="welcome-text"></h3>
            <button class="btn" onclick="location.reload()">LOGOUT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Account DB (For identity)
        const accountConfig = { databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app" };
        // Pinky DB (For threads) - Reusing the Index URL provided earlier for Pinky data
        const pinkyConfig = { databaseURL: "https://index-data-4a3b9-default-rtdb.asia-southeast1.firebasedatabase.app" };

        const accApp = initializeApp(accountConfig, "accApp");
        const pinApp = initializeApp(pinkyConfig, "pinApp");
        const userDb = getDatabase(accApp);
        const pinkyDb = getDatabase(pinApp);

        let currentUser = null;
        let isAnonymous = false;
        let activeThreadId = null;

        const starWords = ["jade", "crimson", "void", "silk", "iron", "lotus", "ghost", "azure", "gold", "dust", "shadow", "mist"];

        // --- AUTH ---
        document.getElementById('auth-btn').onclick = () => document.getElementById('auth-modal').style.display = 'block';
        document.getElementById('loginBtn').onclick = async () => {
            const u = document.getElementById('uIn').value, p = document.getElementById('pIn').value;
            const snap = await get(ref(userDb, `users/${u}`));
            if(snap.exists() && snap.val().password === p) {
                currentUser = snap.val(); currentUser.username = u;
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('user-view').style.display = 'block';
                document.getElementById('welcome-text').innerText = `${currentUser.display_name}, ${currentUser.rank}`;
                document.getElementById('auth-btn').innerText = "ACCOUNT INFO";
                document.getElementById('auth-modal').style.display = 'none';
            } else alert("Unknown Entity.");
        };

        // --- ANON MONIKER LOGIC (Concatenate 2 random words) ---
        function getAnonName() {
            let first = starWords[Math.floor(Math.random() * starWords.length)];
            let second = starWords[Math.floor(Math.random() * starWords.length)];
            // Ensure we don't get the same word twice (like lotuslotus)
            while (first === second) {
                second = starWords[Math.floor(Math.random() * starWords.length)];
            }
            // Capitalize first letter of combined word
            const combined = first + second;
            return combined.charAt(0).toUpperCase() + combined.slice(1) + " Star";
        }

        // --- BOARD LOGIC ---
        function loadThreads() {
            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';
            onValue(ref(pinkyDb, boardPath), snap => {
                const manager = document.getElementById('thread-manager');
                manager.innerHTML = "";
                const now = Date.now();

                snap.forEach(child => {
                    const thread = child.val();
                    const tid = child.key;

                    // 12-Hour Auto-Delete Check
                    const lastActivity = thread.lastActivity || thread.createdAt;
                    if (now - lastActivity > (12 * 60 * 60 * 1000)) {
                        remove(ref(pinkyDb, `${boardPath}/${tid}`));
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = 'thread-card';
                    card.innerHTML = `
                        <div class="thread-title">${thread.title}</div>
                        <div class="thread-meta">Started by: ${thread.authorName}</div>
                    `;
                    card.onclick = () => openThread(tid, thread.title);
                    manager.appendChild(card);
                });
            });
        }

        // --- SWITCHING SIDES ---
        document.getElementById('switchBtn').onclick = () => {
            isAnonymous = !isAnonymous;
            const main = document.getElementById('main-view');
            main.className = isAnonymous ? 'main-container anon-side' : 'main-container public-side';
            closeThread();
            loadThreads();
        };

        // --- THREAD INTERACTION ---
        document.getElementById('openCreateBtn').onclick = () => {
            if(!currentUser) return alert("Sign in to create threads.");
            document.getElementById('create-modal').style.display = 'block';
        };

        document.getElementById('submitThreadBtn').onclick = async () => {
            const title = document.getElementById('newTitle').value;
            const body = document.getElementById('newBody').value;
            if(!title || !body) return;

            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';
            const author = isAnonymous ? getAnonName() : `${currentUser.display_name}, ${currentUser.rank} of the ${currentUser.finger || 'Void'}`;

            const threadRef = push(ref(pinkyDb, boardPath));
            await set(threadRef, {
                title: title,
                authorName: author,
                createdAt: serverTimestamp(),
                lastActivity: serverTimestamp()
            });

            await push(ref(pinkyDb, `posts/${threadRef.key}`), {
                author: author,
                text: body,
                timestamp: serverTimestamp()
            });

            document.getElementById('create-modal').style.display = 'none';
        };

        window.openThread = (tid, title) => {
            activeThreadId = tid;
            document.getElementById('active-thread-view').style.display = 'flex';
            onValue(ref(pinkyDb, `posts/${tid}`), snap => {
                const list = document.getElementById('post-list');
                list.innerHTML = `<h2>${title}</h2>`;
                snap.forEach(child => {
                    const p = child.val();
                    const div = document.createElement('div');
                    div.className = 'post-entry';
                    div.innerHTML = `<div class="post-identity">${p.author}</div><div>${p.text}</div>`;
                    list.appendChild(div);
                });
            });
        };

        window.closeThread = () => {
            document.getElementById('active-thread-view').style.display = 'none';
            activeThreadId = null;
        };

        document.getElementById('submitReplyBtn').onclick = async () => {
            const text = document.getElementById('replyText').value;
            if(!text || !activeThreadId || !currentUser) return;

            const author = isAnonymous ? getAnonName() : `${currentUser.display_name}, ${currentUser.rank} of the ${currentUser.finger || 'Void'}`;
            const boardPath = isAnonymous ? 'anon_threads' : 'public_threads';

            await push(ref(pinkyDb, `posts/${activeThreadId}`), {
                author: author,
                text: text,
                timestamp: serverTimestamp()
            });

            await update(ref(pinkyDb, `${boardPath}/${activeThreadId}`), { lastActivity: Date.now() });
            document.getElementById('replyText').value = "";
        };

        window.filterThreads = () => {
            const q = document.getElementById('threadSearch').value.toLowerCase();
            document.querySelectorAll('.thread-card').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };

        loadThreads();
    </script>
</body>
</html>
